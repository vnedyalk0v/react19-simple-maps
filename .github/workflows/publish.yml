name: Release & Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
      checks: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@c48e67d110a68bc90ccf1098e9646092baacaa87 # v1.6.0
        with:
          publish: npm run release
          title: 'chore: release package'
          commit: 'chore: release package'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Find open release PR
        if: steps.changesets.outputs.published != 'true'
        id: release_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_json=$(gh pr list \
            --base main \
            --head changeset-release/main \
            --state open \
            --json number,headRefOid \
            --jq '.[0]')

          if [ -z "$pr_json" ] || [ "$pr_json" = "null" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$pr_json" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo "$pr_json" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"

      - name: Start release PR CI check
        if: steps.release_pr.outputs.exists == 'true'
        id: release_pr_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          check_id=$(gh api repos/${{ github.repository }}/check-runs \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -f name='ci' \
            -f head_sha='${{ steps.release_pr.outputs.sha }}' \
            -f status='in_progress' \
            -f details_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            --jq '.id')

          echo "id=$check_id" >> "$GITHUB_OUTPUT"

      - name: Checkout release PR merge commit
        if: steps.release_pr.outputs.exists == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/pull/${{ steps.release_pr.outputs.number }}/merge
          fetch-depth: 0

      - name: Validate release PR
        if: steps.release_pr.outputs.exists == 'true'
        id: release_pr_validation
        continue-on-error: true
        run: |
          npm ci
          npm run build
          npm run type-check
          npm run lint
          npm run check-format
          npm run test

      - name: Complete release PR CI check
        if: always() && steps.release_pr.outputs.exists == 'true' && steps.release_pr_check.outputs.id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          conclusion=success
          if [ "${{ steps.release_pr_validation.outcome }}" != "success" ]; then
            conclusion=failure
          fi

          gh api repos/${{ github.repository }}/check-runs/${{ steps.release_pr_check.outputs.id }} \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -f status='completed' \
            -f conclusion="$conclusion" \
            -f completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Fail workflow when release PR validation fails
        if: steps.release_pr.outputs.exists == 'true' && steps.release_pr_validation.outcome != 'success'
        run: exit 1

      - name: Publish to GitHub Package Registry
        if: steps.changesets.outputs.published == 'true'
        run: |
          cp package.json package.json.backup
          npm pkg set publishConfig.registry="https://npm.pkg.github.com"
          npm pkg set publishConfig.access="public"

          npm config set @vnedyalk0v:registry https://npm.pkg.github.com --userconfig "$NPM_CONFIG_USERCONFIG"
          npm config set //npm.pkg.github.com/:_authToken "${NODE_AUTH_TOKEN}" --userconfig "$NPM_CONFIG_USERCONFIG"

          npm publish --registry=https://npm.pkg.github.com

          mv package.json.backup package.json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npmrc-github
