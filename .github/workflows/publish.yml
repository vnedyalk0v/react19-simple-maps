name: Release & Publish

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: release package')) ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        github.event.pull_request.head.ref == 'changeset-release/main'
      )
    name: Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          publish: npm run release
          title: 'chore: release package'
          commit: 'chore: release package'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Find open release PR
        if: steps.changesets.outputs.published != 'true'
        id: release_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(gh pr list \
            --base main \
            --head changeset-release/main \
            --state open \
            --json number \
            --jq '.[0].number // ""')

          if [ -z "$pr_number" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch_sha=$(gh api repos/${{ github.repository }}/git/ref/heads/changeset-release/main --jq '.object.sha')

          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "sha=$branch_sha" >> "$GITHUB_OUTPUT"

      - name: Start release PR required checks
        if: steps.release_pr.outputs.exists == 'true'
        id: release_pr_checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ci_check_id=$(gh api repos/${{ github.repository }}/check-runs \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -f name='ci' \
            -f head_sha='${{ steps.release_pr.outputs.sha }}' \
            -f status='in_progress' \
            -f details_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            --jq '.id')

          dependency_review_check_id=$(gh api repos/${{ github.repository }}/check-runs \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -f name='dependency-review' \
            -f head_sha='${{ steps.release_pr.outputs.sha }}' \
            -f status='in_progress' \
            -f details_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
            --jq '.id')

          echo "ci_id=$ci_check_id" >> "$GITHUB_OUTPUT"
          echo "dependency_review_id=$dependency_review_check_id" >> "$GITHUB_OUTPUT"

      - name: Checkout release PR merge commit
        if: steps.release_pr.outputs.exists == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/pull/${{ steps.release_pr.outputs.number }}/merge
          fetch-depth: 0

      - name: Validate release PR
        if: steps.release_pr.outputs.exists == 'true'
        id: release_pr_validation
        continue-on-error: true
        run: |
          npm ci --ignore-scripts
          npm run ci

      - name: Review release PR dependencies
        if: steps.release_pr.outputs.exists == 'true'
        id: release_pr_dependency_review
        continue-on-error: true
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          base-ref: main
          head-ref: changeset-release/main

      - name: Complete release PR required checks
        if: always() && steps.release_pr.outputs.exists == 'true' && steps.release_pr_checks.outputs.ci_id != '' && steps.release_pr_checks.outputs.dependency_review_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ci_conclusion=success
          if [ "${{ steps.release_pr_validation.outcome }}" != "success" ]; then
            ci_conclusion=failure
          fi

          dependency_review_conclusion=success
          if [ "${{ steps.release_pr_dependency_review.outcome }}" != "success" ]; then
            dependency_review_conclusion=failure
          fi

          completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          gh api repos/${{ github.repository }}/check-runs/${{ steps.release_pr_checks.outputs.ci_id }} \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -f status='completed' \
            -f conclusion="$ci_conclusion" \
            -f completed_at="$completed_at"

          gh api repos/${{ github.repository }}/check-runs/${{ steps.release_pr_checks.outputs.dependency_review_id }} \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -f status='completed' \
            -f conclusion="$dependency_review_conclusion" \
            -f completed_at="$completed_at"

      - name: Fail workflow when release PR checks fail
        if: steps.release_pr.outputs.exists == 'true' && (steps.release_pr_validation.outcome != 'success' || steps.release_pr_dependency_review.outcome != 'success')
        run: exit 1
